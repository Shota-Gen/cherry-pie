services:
  # The "Brain" (FastAPI + Python)
  api:
    build: ./backend-api
    container_name: studyconnect_api
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@host.docker.internal:54322/postgres
      - SUPABASE_URL=http://host.docker.internal:54321
      - SUPABASE_KEY=${SUPABASE_ANON_KEY}
  # The "Pulse" (Swift UDP Relay)
  # Uncomment once backend-relay has source code (Package.swift, Sources/, etc.)
  # relay:
  #   build: ./backend-relay
  #   container_name: studyconnect_relay
  #   ports:
  #     - "5000:5000/udp"
